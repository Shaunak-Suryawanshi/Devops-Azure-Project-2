apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-app
  namespace: incident-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: incident-app
  template:
    metadata:
      labels:
        app: incident-app
    spec:
      containers:
        - name: incident-app
          image: incident-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1000
          envFrom:
            - configMapRef:
                name: incident-app-config
            - secretRef:
                name: incident-app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 1000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 1000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: incident-app
  namespace: incident-platform
spec:
  type: NodePort
  selector:
    app: incident-app
  ports:
    - protocol: TCP
      port: 1000
      targetPort: 1000
      nodePort: 31000
