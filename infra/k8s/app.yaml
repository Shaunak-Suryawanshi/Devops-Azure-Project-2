apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-app
  namespace: incident-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-app
  template:
    metadata:
      labels:
        app: incident-app
    spec:
      containers:
        - name: incident-app
          image: incident-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1000
          env:
            - name: MONGODB_URI
              value: mongodb://mongo:27017/
            - name: MONGODB_DB_NAME
              value: incident_platform
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_USERNAME
              value: ""
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_SSL
              value: "false"
            - name: RATE_LIMIT_REQUESTS
              value: "30"
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: "60"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-app
  namespace: incident-platform
spec:
  type: NodePort
  selector:
    app: incident-app
  ports:
    - protocol: TCP
      port: 1000
      targetPort: 1000
      nodePort: 31000
